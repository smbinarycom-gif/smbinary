    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --font-primary: 'IBM Plex Sans', sans-serif;
            --font-secondary: 'Inter', sans-serif;
        }
        body {
            font-family: var(--font-primary);
            /* Prevent flash-of-white on initial load by matching app dark bg */
            background-color: #131722;
            color: #e6eef8;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        /* Hide scrollbar for Chrome, Safari and Opera */
        ::-webkit-scrollbar {
          display: none;
        }
        /* Hide scrollbar for IE, Edge and Firefox */
        body {
          -ms-overflow-style: none;  /* IE and Edge */
          scrollbar-width: none;  /* Firefox */
        }
        canvas {
          cursor: crosshair;
        }
        /* Custom scrollbar for admin panels */
        .custom-scrollbar::-webkit-scrollbar {
            display: block;
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.02);
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        
        /* STRICT REMOVAL OF TRADINGVIEW BRANDING */
        [class*="tradingview"], 
        [id*="tradingview"], 
        a[href*="tradingview"],
        .tv-embed-widget-wrapper__footer,
        .tv-widget-watch-list__footer {
            display: none !important;
            visibility: hidden !important;
            opacity: 0 !important;
            pointer-events: none !important;
            height: 0 !important;
            width: 0 !important;
        }

        .premium-card-glow {
            box-shadow: 0 4px 20px rgba(0,0,0,0.03), 0 0 1px rgba(0,0,0,0.05);
        }
        .active-sidebar-glow {
            background-color: #f1f5f9;
            color: #0b0e11;
        }

        /* Binance-style Typography Helpers */
        .font-binance {
            font-family: 'IBM Plex Sans', sans-serif;
        }
    </style>
